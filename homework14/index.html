<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <table class="calendar">
        <tr>
            <th class="title" colspan="7">Июнь 2025</th>
        </tr>

        <tr class="week">
            <th>ПН</th>
            <th>ВТ</th>
            <th>СР</th>
            <th>ЧТ</th>
            <th>ПТ</th>
            <th class="sat">СБ</th>
            <th class="sun">ВС</th>
        </tr>

        <tr>
            <td colspan="6"></td>
            <td class="sun">01</td>
        </tr>

        <tr>
            <td>02</td>
            <td>03</td>
            <td>04</td>
            <td>05</td>
            <td>06</td>
            <td class="sat">07</td>
            <td class="sun">08</td>
        </tr>

        <tr>
            <td>09</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td>13</td>
            <td class="sat">14</td>
            <td class="sun">15</td>
        </tr>

        <tr>
            <td>16</td>
            <td>17</td>
            <td>18</td>
            <td>19</td>
            <td>20</td>
            <td class="sat">21</td>
            <td class="sun">22</td>
        </tr>

        <tr>
            <td>23</td>
            <td>24</td>
            <td>25</td>
            <td>26</td>
            <td>27</td>
            <td class="sat">28</td>
            <td class="sun">29</td>
        </tr>

        <tr>
            <td>30</td>
            <td colspan="6"></td>
        </tr>
    </table>
</body>

</html>
