<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛохХатронБанк</title>
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="header_container">
                <div class="header-logo">
                    <img src="./LogoBank.png" alt="Логотип компании" class="logo">
                </div>

                <nav class="nav">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Главная</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">О компании</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Цены</a>
                        </li>
                    </ul>
                </nav>

                <div class="number">
                    +7 999 999 99 99
                </div>

            </div>
            <hr>
        </div>

    </header>
    <main>
        <section class="hero">
            <div class="hero-inner">
                <div class="hero-banner">
                    <img src="./HeroBanner.png" alt="юбилей банка" class="banner">
                </div>
                <div class="container">
                    <h1>Добро пожаловать в ЛохХатронБанк</h1>
                    <h2>Хуже уже не будет. Спойлер: будет.</h2>

                    <a href="#" class="button">Оформить что-нибудь сомнительное</a>
            </div>
        </section>
    </main>

</body>

</html>
